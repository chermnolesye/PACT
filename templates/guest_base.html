<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header class="header">
        <nav>
            <input type="checkbox" name="menu" id="btn-menu" />
            <label for="btn-menu" class="burger">
                <svg class="bi flex-shrink-0" xmlns="http://www.w3.org/2000/svg" height="30px" fill="none" stroke="currentColor" viewBox="0 0 20 20">
                    <path stroke-linecap="round" stroke-width="1.5" d="M4 7h3m13 0h-9M20 17h-3M4 17h9M4 12h16"></path>
                </svg>
            </label>
            <ul>
                <li>
                    <a href="{% url 'corpus_search' %}" class="header__link">
                        <svg class="bi" xmlns="http://www.w3.org/2000/svg" height="30px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-width="1.5" d="M22 12.2v1.53c0 3.9 0 5.85-1.17 7.06S17.77 22 14 22h-4c-3.77 0-5.66 0-6.83-1.21S2 17.63 2 13.73V12.2c0-2.28 0-3.43.52-4.38.52-.95 1.47-1.53 3.36-2.71l2-1.24C9.88 2.62 10.9 2 12 2c1.1 0 2.11.62 4.12 1.87l2 1.24c1.9 1.18 2.84 1.76 3.36 2.71M15 18H9"></path>
                        </svg>
                        ПАКТ
                    </a>
                </li>

                <!-- <li>
                    <a href="/authors" class="header__link" >
                        <svg class="header-svg" xmlns="http://www.w3.org/2000/svg" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path fill="currentColor" stroke-linecap="round" stroke-width="1.5" d="M12 17v-6"></path>
                            <circle cx="1" cy="1" r="0.5" fill="currentColor" transform="matrix(1 0 0 -1 11 9)"></circle>
                            <path stroke-linecap="round" stroke-width="1.5" d="M7 3.338A9.954 9.954 0 0 1 12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12c0-1.821.487-3.53 1.338-5"></path>
                        </svg>
                Разработчики
                    </a>
                </li>     -->
            </ul>
        </nav>
        <div class="header__right">
            <a href="/auth/login" class="header__link">
                Войти  
                <svg xmlns="http://www.w3.org/2000/svg" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="header-svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 12h14m0 0-3.5-3m3.5 3-3.5 3"></path>
                    <path stroke-linecap="round" stroke-width="1.5" d="M9 7c.01-2.18.11-3.35.88-4.12C10.76 2 12.18 2 15 2h1c2.83 0 4.24 0 5.12.88.88.88.88 2.3.88 5.12v8c0 2.83 0 4.24-.88 5.12-.77.77-1.94.87-4.12.88m-8-5c.01 2.18.11 3.35.88 4.12.64.64 1.57.82 3.12.86"></path>
                </svg>
            </a>
        </div>
    </header>

    <div class="main-template-container">
        {% block content %}{% endblock %}
    </div>

    {% include 'includes/toastr.html' %}

    {% block extra_scripts %}{% endblock %}
</body>
</html>
