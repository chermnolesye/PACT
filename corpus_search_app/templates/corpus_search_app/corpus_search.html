        }

    function makeSelect(options, valueKey, textKey, name) {
        const select = document.createElement("select");
        select.dataset.field = name;

        const emptyOption = document.createElement("option");
        emptyOption.value = "";
        emptyOption.textContent = "---";
        select.appendChild(emptyOption);

        options.forEach(item => {
            const option = document.createElement("option");
            option.value = item[valueKey];
            option.textContent = item[textKey];
            select.appendChild(option);
        });

        return select;
    }

    function deleteGroup(groupElement) {
        if (confirm("Вы уверены, что хотите удалить этот блок?")) {
            const groupIndex = parseInt(groupElement.dataset.groupIndex);
            groupElement.remove();
            
            // Обновляем индексы оставшихся блоков
            const remainingGroups = document.querySelectorAll("#groups-container > div");
            remainingGroups.forEach((group, idx) => {
                group.dataset.groupIndex = idx;
                
                // Обновляем текст в кнопках удаления (опционально)
                const deleteBtn = group.querySelector("button");
                if (deleteBtn && deleteBtn.textContent.includes("Удалить блок")) {
                    // Можно оставить без изменений или добавить номер блока
                    deleteBtn.textContent = `✕ Удалить блок ${idx + 1}`;
                }
            });
            
            // Опционально: если удалили все блоки, добавляем один пустой
            if (remainingGroups.length === 0) {
                addGroup();
            }
        }
    }

    function collectPayload() {
        const blocks = Array.from(groupsContainer.children);
        const groups = [];
        const operators = [];

        blocks.forEach((block, index) => {
            if (index > 0) {
                const operatorSelect = block.querySelector("[data-operator='true']");
                operators.push(operatorSelect ? operatorSelect.value : "AND");
            }

            const group = {};
            const fields = [
                "wordform",
                "pos_tag_id",
                "error_tag_id",
                "error_level_id",
                "reason_id",
                "title",
                "text_type_id",
                "emotion_id"
            ];

            fields.forEach(fieldName => {
                const fieldElement = block.querySelector(`[data-field='${fieldName}']`);
                const notElement = block.querySelector(`[data-not-field='${fieldName}']`);

                let value = null;
                if (fieldElement) {
                    value = fieldElement.value;
                    if (value === "") {
                        value = null;
                    } else if (fieldName.endsWith("_id")) {
                        value = Number(value);
                    }
                }

                group[fieldName] = {
                    value: value,
                    not: notElement ? notElement.checked : false
                };
            });

            groups.push(group);
        });

        return { groups, operators };
    }

    async function doSearch(page = 1) {
        if (isLoading) return;
        
        isLoading = true;
        const payload = collectPayload();
        payload.page = page;
        payload.page_size = pageSize;
        
        // Сохраняем запрос для использования в ссылках пагинации
        currentQuery = payload;

        try {
            const response = await fetch("/corpus/api/search/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            // Проверяем, есть ли данные пагинации
            if (data.page_obj) {
                currentPage = data.page_obj.number;
                totalPages = data.page_obj.num_pages;
            } else {
                // Если пагинация не пришла, показываем все результаты
                totalPages = 1;
            }
            
            displayResults(data);
            
            // Показываем пагинацию только если есть данные и страниц больше 1
            if (data.page_obj && data.page_obj.num_pages > 1) {
                displayPagination(data.page_obj);
            }
            
        } catch (error) {
            console.error("Ошибка при поиске:", error);
            alert("Произошла ошибка при поиске");
        } finally {
            isLoading = false;
        }
    }

    function displayResults(data) {
        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        // Показываем количество результатов
        const countP = document.createElement("p");
        countP.textContent = `Найдено: ${data.count}`;
        resultsDiv.appendChild(countP);

        // Проверяем, есть ли результаты
        if (!data.results || data.results.length === 0) {
            const noResults = document.createElement("p");
            noResults.textContent = "Ничего не найдено";
            noResults.style.color = "#666";
            noResults.style.fontStyle = "italic";
            resultsDiv.appendChild(noResults);
            return;
        }

        const isTeacher = data.is_teacher;

        data.results.forEach(item => {
            const div = document.createElement("div");
            div.className = "search-result-item";

            const header = document.createElement("h3");
            // header.innerHTML = `<a href="/corpus/text/${item.id}/">${item.header}</a>`;
            if (isTeacher) {
                header.innerHTML = `<a href="/corpus/text/${item.id}/">${item.header}</a>`;
            } else {
                header.textContent = item.header;
            }
            div.appendChild(header);

            // const meta = document.createElement("div");
            // meta.style.color = "#666";
            // meta.style.marginBottom = "10px";
            // meta.style.fontSize = "0.9em";
            // meta.innerHTML = `
            //     Дата: ${item.createdate || "Не указано"} | 
            //     Тип текста: ${item.text_type} | 
            //     Состояние: ${item.emotion}
            // `;
            // div.appendChild(meta);

            if (item.matching_sentences && item.matching_sentences.length > 0) {
                // const sentencesTitle = document.createElement("h4");
                // sentencesTitle.textContent = "Найденные фрагменты:";
                // sentencesTitle.style.marginBottom = "10px";
                // div.appendChild(sentencesTitle);
                
                item.matching_sentences.forEach(sentenceContext => {
                    const sentenceDiv = document.createElement("div");
                    sentenceDiv.className = "sentence-context";
                    sentenceDiv.style.marginBottom = "15px";
                    sentenceDiv.style.padding = "8px";
                    sentenceDiv.style.backgroundColor = "#f9f9f9";
                    sentenceDiv.style.borderLeft = "3px solid #007bff";
                    sentenceDiv.style.borderRadius = "3px";
                    
                    if (sentenceContext.previous) {
                        const prevSpan = document.createElement("div");
                        prevSpan.className = "prev-sentence";
                        prevSpan.innerHTML = `${sentenceContext.previous.text}`;
                        sentenceDiv.appendChild(prevSpan);
                    }
                    
                    const currentSpan = document.createElement("div");
                    currentSpan.className = "current-sentence";
                    if (sentenceContext.current.highlighted_text) {
                        currentSpan.innerHTML = sentenceContext.current.highlighted_text;
                    } else {
                        currentSpan.textContent = sentenceContext.current.text;
                    }
                    sentenceDiv.appendChild(currentSpan);
                    
                    if (sentenceContext.next) {
                        const nextSpan = document.createElement("div");
                        nextSpan.className = "next-sentence";
                        nextSpan.innerHTML = `${sentenceContext.next.text}`;
                        sentenceDiv.appendChild(nextSpan);
                    }
                    
                    div.appendChild(sentenceDiv);
                });
            }

            resultsDiv.appendChild(div);
        });
    }

    function displayPagination(pageObj) {
        const resultsDiv = document.getElementById("results");
        
        // Удаляем старую пагинацию, если есть
        const oldPagination = resultsDiv.querySelector(".pagination");
        if (oldPagination) {
            oldPagination.remove();
        }
        
        if (totalPages <= 1) return;

        const paginationDiv = document.createElement("div");
        paginationDiv.className = "pagination";
        paginationDiv.style.marginTop = "20px";
        paginationDiv.style.textAlign = "center";
        paginationDiv.style.display = "flex";
        paginationDiv.style.justifyContent = "center";
        paginationDiv.style.gap = "10px";
        paginationDiv.style.flexWrap = "wrap";

        if (pageObj.has_previous) {
            const firstLink = document.createElement("span");
            firstLink.className = "step-links";
            const firstA = document.createElement("a");
            firstA.href = "#";
            firstA.innerHTML = "&laquo; Первая";
            firstA.onclick = (e) => {
                e.preventDefault();
                if (!isLoading) {
                    doSearch(1);
                }
            };
            firstLink.appendChild(firstA);
            paginationDiv.appendChild(firstLink);
        }

        if (pageObj.has_previous) {
            const prevLink = document.createElement("span");
            prevLink.className = "step-links";
            const prevA = document.createElement("a");
            prevA.href = "#";
            prevA.innerHTML = "&#8249; Назад";
            prevA.onclick = (e) => {
                e.preventDefault();
                if (!isLoading) {
                    doSearch(pageObj.previous_page_number);
                }
            };
            prevLink.appendChild(prevA);
            paginationDiv.appendChild(prevLink);
        }
        
        const currentSpan = document.createElement("span");
        currentSpan.className = "current";
        currentSpan.innerHTML = `Страница <span class="current-number">${pageObj.number}</span> из ${pageObj.num_pages}`;
        paginationDiv.appendChild(currentSpan);
        
        if (pageObj.has_next) {
            const nextLink = document.createElement("span");
            nextLink.className = "step-links";
            const nextA = document.createElement("a");
            nextA.href = "#";
            nextA.innerHTML = "Вперед &#8250;";
            nextA.onclick = (e) => {
                e.preventDefault();
                if (!isLoading) {
                    doSearch(pageObj.next_page_number);
                }
            };
            nextLink.appendChild(nextA);
            paginationDiv.appendChild(nextLink);
        }

        if (pageObj.has_next) {
            const lastLink = document.createElement("span");
            lastLink.className = "step-links";
            const lastA = document.createElement("a");
            lastA.href = "#";
            lastA.innerHTML = "Последняя &raquo;";
            lastA.onclick = (e) => {
                e.preventDefault();
                if (!isLoading) {
                    doSearch(pageObj.num_pages);
                }
            };
            lastLink.appendChild(lastA);
            paginationDiv.appendChild(lastLink);
        }
        
        resultsDiv.appendChild(paginationDiv);
    }

    // Функция для прокрутки к результатам
    function scrollToResults() {
        const resultsDiv = document.getElementById("results");
        resultsDiv.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    document.getElementById("add-group-btn").addEventListener("click", addGroup);
    document.getElementById("search-btn").addEventListener("click", () => doSearch(1));

    document.addEventListener("DOMContentLoaded", function () {
        loadFilters();
    });
</script>
